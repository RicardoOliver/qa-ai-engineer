name: 🧪 ML Quality Gate CI

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 6 * * *"   # Daily 06:00 UTC — catch model degradation

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  MODEL_API_URL: ${{ secrets.MODEL_API_URL }}
  MODEL_API_TOKEN: ${{ secrets.MODEL_API_TOKEN }}
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

# ──────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Code Quality ──────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Black format check
        run: black --check src/ tests/

      - name: MyPy type check
        run: mypy src/

  # ── 2. Data Quality Gate ─────────────────────────────────────────────────────
  data-quality:
    name: 📊 Data Quality Gate
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run Data Quality Tests
        run: |
          pytest tests/unit/test_data_quality.py \
            -v -m unit \
            --html=reports/html/data_quality_report.html \
            --self-contained-html \
            --tb=short

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: data-quality-report
          path: reports/html/data_quality_report.html

  # ── 3. Model Metrics Gate ─────────────────────────────────────────────────────
  model-metrics:
    name: 🤖 Model Metrics Gate
    runs-on: ubuntu-latest
    needs: data-quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run Model Validation Tests
        run: |
          pytest tests/unit/test_model_metrics.py \
            -v -m unit \
            --html=reports/html/model_metrics_report.html \
            --self-contained-html \
            --tb=short

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-metrics-report
          path: reports/html/model_metrics_report.html

      - name: Notify Slack on failure
        if: failure()
        run: |
          python scripts/notify_slack.py \
            --status failed \
            --stage "Model Metrics Gate" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  # ── 4. Fairness Gate ──────────────────────────────────────────────────────────
  fairness:
    name: ⚖️ Fairness & Bias Gate
    runs-on: ubuntu-latest
    needs: model-metrics
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run Fairness Tests
        run: |
          pytest tests/fairness/ \
            -v -m fairness \
            --html=reports/html/fairness_report.html \
            --self-contained-html \
            --tb=short

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fairness-report
          path: reports/html/fairness_report.html

  # ── 5. API Contract Tests ─────────────────────────────────────────────────────
  api-contract:
    name: 🌐 API Contract Tests
    runs-on: ubuntu-latest
    needs: [model-metrics, fairness]
    if: github.event_name != 'pull_request' || github.base_ref == 'main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run API Contract Tests
        env:
          MODEL_API_URL: ${{ env.MODEL_API_URL }}
        run: |
          pytest tests/integration/ \
            -v -m integration \
            --html=reports/html/api_contract_report.html \
            --self-contained-html \
            --tb=short

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-contract-report
          path: reports/html/api_contract_report.html

  # ── 6. Performance Tests ──────────────────────────────────────────────────────
  performance:
    name: 🚀 Performance Tests (K6)
    runs-on: ubuntu-latest
    needs: api-contract
    if: github.ref == 'refs/heads/main' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Install K6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install k6 -y

      - name: Run K6 Load Tests
        env:
          MODEL_API_URL: ${{ env.MODEL_API_URL }}
        run: |
          mkdir -p reports/html reports/json
          k6 run tests/performance/load_test_model.js \
            --out json=reports/json/k6_results.json \
            -e MODEL_API_URL=$MODEL_API_URL

      - name: Upload K6 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: |
            reports/html/performance_report.html
            reports/json/k6_results.json

  # ── 7. E2E Gate ───────────────────────────────────────────────────────────────
  e2e:
    name: 🔁 End-to-End Pipeline Gate
    runs-on: ubuntu-latest
    needs: [data-quality, model-metrics, fairness]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run E2E Tests
        run: |
          pytest tests/e2e/ \
            -v -m e2e \
            --html=reports/html/e2e_report.html \
            --self-contained-html \
            --tb=short \
            --timeout=120

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: reports/html/e2e_report.html

  # ── 8. Final Summary ──────────────────────────────────────────────────────────
  summary:
    name: 📋 Quality Gate Summary
    runs-on: ubuntu-latest
    needs: [data-quality, model-metrics, fairness, e2e]
    if: always()
    steps:
      - name: Check all gates
        run: |
          echo "## 🧪 ML Quality Gate Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Data Quality | ${{ needs.data-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Model Metrics | ${{ needs.model-metrics.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Fairness | ${{ needs.fairness.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Pipeline | ${{ needs.e2e.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any gate failed
        if: |
          needs.data-quality.result == 'failure' ||
          needs.model-metrics.result == 'failure' ||
          needs.fairness.result == 'failure' ||
          needs.e2e.result == 'failure'
        run: |
          echo "❌ One or more quality gates FAILED. Deployment blocked."
          exit 1

      - name: Notify Slack — all clear
        if: success()
        run: echo "✅ All quality gates passed. Safe to deploy."
