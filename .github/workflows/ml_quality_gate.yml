name: 🧪 ML Quality Gate CI

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 6 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  MODEL_API_URL: ${{ secrets.MODEL_API_URL }}
  MODEL_API_TOKEN: ${{ secrets.MODEL_API_TOKEN }}
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

jobs:

  # ─────────────────────────────────────────────
  # 🔍 LINT (COM AUTO-FIX + QUALITY GATE)
  # ─────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Upgrade build tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies
        run: pip install .[dev]

      # 🔥 AUTO FIX (não quebra o pipeline)
      - name: Ruff auto-fix
        run: ruff check src/ tests/ --fix --unsafe-fixes || true

      - name: Black format
        run: black src/ tests/

      # 🔒 QUALITY GATE REAL
      - name: Ruff final check
        run: ruff check src/ tests/

      - name: MyPy type check
        run: mypy src/

  # ─────────────────────────────────────────────
  # 📊 DATA QUALITY
  # ─────────────────────────────────────────────
  data-quality:
    name: 📊 Data Quality Gate
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - run: python -m pip install --upgrade pip setuptools wheel
      - run: pip install .[dev]

      - run: |
          mkdir -p reports/html
          pytest tests/unit/test_data_quality.py \
            -v -m unit \
            --html=reports/html/data_quality_report.html \
            --self-contained-html \
            --tb=short

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: data-quality-report
          path: reports/html/data_quality_report.html

  # ─────────────────────────────────────────────
  # 🤖 MODEL METRICS
  # ─────────────────────────────────────────────
  model-metrics:
    name: 🤖 Model Metrics Gate
    runs-on: ubuntu-latest
    needs: data-quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - run: python -m pip install --upgrade pip setuptools wheel
      - run: pip install .[dev]

      - run: |
          mkdir -p reports/html
          pytest tests/unit/test_model_metrics.py \
            -v -m unit \
            --html=reports/html/model_metrics_report.html \
            --self-contained-html \
            --tb=short

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: model-metrics-report
          path: reports/html/model_metrics_report.html

  # ─────────────────────────────────────────────
  # ⚖️ FAIRNESS
  # ─────────────────────────────────────────────
  fairness:
    name: ⚖️ Fairness Gate
    runs-on: ubuntu-latest
    needs: model-metrics
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - run: python -m pip install --upgrade pip setuptools wheel
      - run: pip install .[dev]

      - run: |
          mkdir -p reports/html
          pytest tests/fairness/ \
            -v -m fairness \
            --html=reports/html/fairness_report.html \
            --self-contained-html

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fairness-report
          path: reports/html/fairness_report.html

  # ─────────────────────────────────────────────
  # 🌐 API CONTRACT
  # ─────────────────────────────────────────────
  api-contract:
    name: 🌐 API Contract
    runs-on: ubuntu-latest
    needs: [model-metrics, fairness]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - run: python -m pip install --upgrade pip setuptools wheel
      - run: pip install .[dev]

      - run: |
          mkdir -p reports/html
          pytest tests/integration/ \
            -v -m integration \
            --html=reports/html/api_contract_report.html \
            --self-contained-html

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-contract-report
          path: reports/html/api_contract_report.html

  # ─────────────────────────────────────────────
  # 🔁 E2E
  # ─────────────────────────────────────────────
  e2e:
    name: 🔁 E2E Gate
    runs-on: ubuntu-latest
    needs: [data-quality, model-metrics, fairness]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - run: python -m pip install --upgrade pip setuptools wheel
      - run: pip install .[dev]

      - run: |
          mkdir -p reports/html
          pytest tests/e2e/ \
            -v -m e2e \
            --html=reports/html/e2e_report.html \
            --self-contained-html \
            --timeout=120

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report
          path: reports/html/e2e_report.html

  # ─────────────────────────────────────────────
  # 📋 SUMMARY
  # ─────────────────────────────────────────────
  summary:
    name: 📋 Summary
    runs-on: ubuntu-latest
    needs: [data-quality, model-metrics, fairness, e2e]
    if: always()
    steps:
      - run: |
          echo "## 🧪 ML Quality Gate Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Data Quality | ${{ needs.data-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Model Metrics | ${{ needs.model-metrics.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Fairness | ${{ needs.fairness.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E | ${{ needs.e2e.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if needed
        if: |
          needs.data-quality.result == 'failure' ||
          needs.model-metrics.result == 'failure' ||
          needs.fairness.result == 'failure' ||
          needs.e2e.result == 'failure'
        run: exit 1