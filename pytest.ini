[pytest]
# ML Quality Gate — pytest configuration
testpaths = tests
addopts =
    --tb=short
    --strict-markers
    --no-header
    -ra

markers =
    unit: Unit tests for model metrics and data quality
    integration: Integration tests requiring a running API
    performance: Performance and load tests (require K6)
    fairness: Bias and fairness validation tests
    e2e: End-to-end full pipeline tests
    slow: Tests that take more than 10 seconds

timeout = 120
log_cli = true
log_cli_level = WARNING
